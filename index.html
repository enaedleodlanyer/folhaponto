<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Folha Ponto — Analisador</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script defer src="./vendor/pdfjs/pdf.js"></script>

  <style>
    :root{
      --navy:#0b1f3b;
      --pool:#00bcd4;
      --orange:#ff7a00;

      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e6edf6;

      --ok-bg:#e9fbf0;
      --ok-bd:#b8f1cf;
      --ok-tx:#0f5132;

      --bad-bg:#ffe9ea;
      --bad-bd:#f6b7be;
      --bad-tx:#a10f1a;

      --abs-bg:#fff6da;
      --abs-bd:#ffd27a;
      --abs-tx:#8a4b00;

      --inc-bg:#f5ebe3;
      --inc-bd:#c8a58a;
      --inc-tx:#6f4e37;

      --sat-bg:#e8f1ff;
      --sat-bd:#93c5fd;
      --sat-tx:#1d4ed8;

      --chip:#eef4ff;
      --shadow:0 12px 30px rgba(11,31,59,.08);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(0,188,212,.10), transparent 60%),
        radial-gradient(700px 400px at 90% 10%, rgba(255,122,0,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      position:relative;
      min-height:100vh;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("img/logo.png");
      background-repeat:no-repeat;
      background-position:center center;
      background-size:420px auto;
      opacity:.04;
      pointer-events:none;
      z-index:0;
    }

    .topbar{
      background: linear-gradient(90deg, var(--navy), #062a5a);
      color:#fff;
      padding:18px 0;
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:22px 18px 60px;
    }

    .topbar .wrap{
      padding-top:0;
      padding-bottom:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      width:100%;
      text-align:center;
    }

    .logo{
      width:44px;
      height:44px;
      border-radius:14px;
      background:
        linear-gradient(135deg, var(--pool), rgba(0,188,212,.25)),
        radial-gradient(18px 18px at 70% 30%, rgba(255,255,255,.65), transparent 70%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
      display:grid;
      place-items:center;
      font-weight:900;
      letter-spacing:.5px;
    }

    .logo-img{
      height:50px;
      width:auto;
      object-fit:contain;
      display:block;
    }

    .brand h1{
      margin:0;
      font-size:18px;
      font-weight:900;
      line-height:1.1;
    }

    .sub{
      margin:14px 0 18px;
      color:var(--muted);
      font-size:13px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow: var(--shadow);
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:center;
    }

    .panel-left{
      min-width:260px;
      flex:1 1 100%;
      text-align:center;
    }

    .panel-title{
      font-weight:900;
      margin:0;
      color:var(--navy);
    }

    .panel-hint{
      margin:6px 0 0;
      color:var(--muted);
      font-size:12px;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      flex:1 1 100%;
    }

    .control{
      display:flex;
      align-items:center;
      gap:6px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 10px;
    }

    .control input,
    .control select{
      border:0;
      outline:none;
      font-size:13px;
      min-width:140px;
      background:transparent;
      color:var(--text);
    }

    .small{
      font-size:13px;
      color:var(--navy);
      font-weight:700;
      white-space:nowrap;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      transition: transform .05s ease, filter .15s ease;
    }

    button:active{
      transform: translateY(1px);
    }

    .btn-orange{
      background: linear-gradient(180deg, var(--orange), #ff5e00);
      color:#fff;
    }

    .btn-orange:hover{
      filter:brightness(1.05);
    }

    .btn-ghost{
      background:#fff;
      border:1px solid var(--border);
      color:var(--navy);
    }

    .btn-ghost:hover{
      filter:brightness(0.98);
    }

    .btn-disabled{
      background:#e9eef5;
      color:#7a889c;
      cursor:not-allowed;
    }

    .file-hidden{
      position:absolute;
      left:-9999px;
      width:1px;
      height:1px;
      opacity:0;
    }

    .label-btn{
      display:inline-block;
      text-align:center;
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      transition: transform .05s ease, filter .15s ease;
      background:var(--navy);
      color:#fff;
      user-select:none;
    }

    .label-btn:active{
      transform: translateY(1px);
    }

    .label-btn:hover{
      filter:brightness(1.08);
    }

    .msg{
      margin-top:10px;
      font-size:13px;
      color:#0f172a;
      text-align:center;
    }

    .cards{
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(0,188,212,.25);
      border-radius:20px;
      padding:18px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .card:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(600px 200px at 10% 0%, rgba(0,188,212,.10), transparent 60%),
        radial-gradient(520px 220px at 90% 20%, rgba(255,122,0,.08), transparent 55%);
      pointer-events:none;
    }

    .card > *{
      position:relative;
    }

    .card-head{
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .name{
      font-size:18px;
      font-weight:900;
      margin:0;
      color:var(--navy);
      letter-spacing:.2px;
      text-transform:uppercase;
    }

    .meta{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .meta b{
      color:#0f172a;
    }

    .meta-grid{
      margin-top:8px;
      display:grid;
      grid-template-columns:170px 1fr;
      gap:6px 12px;
      align-items:start;
    }

    .meta-label{
      color:#7b8aa5;
      font-weight:800;
      font-size:13px;
    }

    .meta-value{
      color:#0f172a;
      font-weight:700;
      font-size:13px;
      word-break:break-word;
    }

    .badges{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .badge{
      font-size:12px;
      font-weight:900;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--chip);
      color:var(--navy);
      white-space:nowrap;
    }

    .badge-red{
      background:var(--bad-bg);
      color:var(--bad-tx);
      border-color:var(--bad-bd);
    }

    .badge-abs{
      background:var(--abs-bg);
      color:var(--abs-tx);
      border-color:var(--abs-bd);
    }

    .badge-inc{
      background:var(--inc-bg);
      color:var(--inc-tx);
      border-color:var(--inc-bd);
    }

    .badge-sat{
      background:var(--sat-bg);
      color:var(--sat-tx);
      border-color:var(--sat-bd);
    }

    .stats{
      margin-top:14px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    .stat{
      background:rgba(255,255,255,.75);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      backdrop-filter: blur(6px);
    }

    .stat .label{
      font-size:11px;
      color:#7b8aa5;
      margin-bottom:6px;
      font-weight:800;
    }

    .stat .val{
      font-size:16px;
      font-weight:900;
      color:#0f172a;
    }

    .stat.warn{
      background:var(--abs-bg);
      border-color:var(--abs-bd);
    }

    .stat.warn .label{
      color:#8a4b00;
    }

    .stat.warn .val{
      color:#7c2d12;
    }

    .mini{
      margin-top:6px;
      font-size:11px;
      font-weight:900;
      color:#8a4b00;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .toggle{
      margin-top:12px;
      color:var(--pool);
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }

    .chev{
      width:16px;
      display:inline-block;
      transition:transform .15s ease;
      font-weight:900;
      color:var(--navy);
    }

    .chev.open{
      transform:rotate(180deg);
    }

    .tabs{
      margin-top:12px;
      display:inline-flex;
      background:#eef5ff;
      padding:4px;
      border-radius:14px;
      gap:4px;
      border:1px solid rgba(0,188,212,.25);
      flex-wrap:wrap;
    }

    .tab{
      border:0;
      border-radius:12px;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
      background:transparent;
      color:#355a7a;
      cursor:pointer;
    }

    .tab.active{
      background:#fff;
      border:1px solid var(--border);
      color:var(--navy);
      box-shadow:0 1px 0 rgba(0,0,0,.03);
    }

    .grid{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    .tile{
      position:relative;
      border-radius:16px;
      padding:12px;
      min-height:82px;
      background:var(--ok-bg);
      color:var(--ok-tx);
      border:1px solid var(--ok-bd);
    }

    .tile.red{
      background:var(--bad-bg);
      color:var(--bad-tx);
      border-color:var(--bad-bd);
    }

    .tile.abs{
      background:var(--abs-bg);
      color:var(--abs-tx);
      border-color:var(--abs-bd);
    }

    .tile.inc{
      background:var(--inc-bg);
      color:var(--inc-tx);
      border-color:var(--inc-bd);
    }

    .tile.sat{
      background:var(--sat-bg);
      color:var(--sat-tx);
      border-color:var(--sat-bd);
    }

    .tile .date{
      font-size:12px;
      font-weight:900;
      opacity:.9;
    }

    .tile .time{
      margin-top:8px;
      font-size:18px;
      font-weight:900;
    }
    .tile .he-percent{
      position:absolute;
      top:8px;
      right:10px;
      font-size:11px;
      font-weight:700;
      opacity:.68;
      letter-spacing:.2px;
      line-height:1;
    }

    .tile.red .he-percent{
      color:var(--bad-tx);
    }

    .tile.sat .he-percent{
      color:var(--sat-tx);
    }

    .tile.abs .he-percent{
      color:var(--abs-tx);
    }

    .tile.inc .he-percent{
      color:var(--inc-tx);
    }

    .tile:not(.red):not(.sat):not(.abs):not(.inc) .he-percent{
      color:var(--ok-tx);
    }


    .tile .warn{
      margin-top:8px;
      font-size:12px;
      font-weight:900;
      color:#ef4444;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .alert{
      margin-top:12px;
      border-radius:16px;
      padding:12px;
      font-size:13px;
      font-weight:900;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .alert.red{
      background:var(--bad-bg);
      border:1px solid var(--bad-bd);
      color:var(--bad-tx);
    }

    .alert.abs{
      background:var(--abs-bg);
      border:1px solid var(--abs-bd);
      color:var(--abs-tx);
    }

    .alert.inc{
      background:var(--inc-bg);
      border:1px solid var(--inc-bd);
      color:var(--inc-tx);
    }

    .alert.sat{
      background:var(--sat-bg);
      border:1px solid var(--sat-bd);
      color:var(--sat-tx);
    }

    .overlay{
      position:fixed;
      inset:0;
      background:transparent;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .overlay.on{
      display:flex;
    }

    .modal{
      width:380px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:16px;
      box-shadow:0 18px 45px rgba(0,0,0,.18);
      display:flex;
      gap:12px;
      align-items:center;
    }

    .spinner{
      width:36px;
      height:36px;
      border-radius:999px;
      border:4px solid #e5e7eb;
      border-top-color:var(--pool);
      animation:spin 1s linear infinite;
    }

    .legend-overlay{
      position:fixed;
      top:140px;
      right:18px;
      left:auto;
      bottom:auto;
      background:transparent;
      display:none;
      z-index:10000;
      width:auto;
      height:auto;
    }

    .legend-overlay.active{
      display:block;
    }
    .topbar,
    .wrap,
    .overlay{
      position:relative;
      z-index:1;
    }


    .legend-modal{
      background:#fff;
      border-radius:20px;
      padding:18px;
      width:320px;
      max-width:calc(100vw - 36px);
      box-shadow:0 20px 50px rgba(0,0,0,.18);
      border:1px solid var(--border);
    }

    .legend-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .legend-header h2{
      margin:0;
      font-size:20px;
      color:var(--navy);
      font-weight:900;
    }

    #closeLegend{
      cursor:pointer;
      font-size:22px;
      font-weight:bold;
      color:#64748b;
      line-height:1;
    }

    .legend-content{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:20px;
    }

    .legend-row{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
      color:var(--text);
      font-size:15px;
    }

    .dot{
      width:18px;
      height:18px;
      border-radius:50%;
      display:inline-block;
      box-shadow: inset 0 2px 4px rgba(255,255,255,.45), 0 2px 6px rgba(0,0,0,.15);
      border:1px solid rgba(0,0,0,.08);
      flex-shrink:0;
    }

    .dot.green{ background:#22c55e; }
    .dot.red{ background:#ef4444; }
    .dot.blue{ background:#3b82f6; }
    .dot.yellow{ background:#facc15; }
    .dot.brown{ background:#8b5e3c; }
    .dot.orange{ background:#fb923c; }

    .legend-footer{
      display:none;
    }

    @keyframes spin{
      to{ transform:rotate(360deg);}
    }


    @media (max-width: 980px){
      .legend-overlay{
        top:auto;
        right:12px;
        bottom:12px;
      }

      .legend-modal{
        width:290px;
      }
    }

    @media (max-width: 980px){
      .stats{ grid-template-columns:1fr 1fr; }
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px){
      .meta-grid{
        grid-template-columns:1fr;
        gap:4px;
      }

      .meta-label{
        margin-top:4px;
      }
    }

    @media (max-width: 520px){
      .stats{ grid-template-columns:1fr; }
      .legend-row{ font-size:14px; }
      .legend-header h2{ font-size:18px; }
    }
  .pin-destaque{color:#b91c1c !important;}
</style>
</head>

<body>
  <div class="topbar">
    <div class="wrap">
      <div class="brand">
        <img src="img/logo.png" class="logo-img" alt="Logo STN">
        <div>
          <h1>Folha Ponto — Relatório Inteligente</h1>
        </div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="panel-left">
        <div class="msg" id="msg"></div>
      </div>

      <div class="btns">
        <div class="control">
          <label class="small">Buscar</label>
          <input id="searchEmployee" type="text" placeholder="Nome ou matrícula" />
        </div>

        <div class="control">
          <label class="small">Filtro</label>
          <select id="statusFilter">
            <option value="all">Todos</option>
            <option value="he">Só HE</option>
            <option value="faltas">Só Faltas</option>
          </select>
        </div>

        <input id="pdfFile" type="file" accept=".pdf,application/pdf" class="file-hidden" multiple />
        <label class="label-btn" for="pdfFile">Selecionar PDF(s) folha</label>

        <input id="pinPdfFile" type="file" accept=".pdf,application/pdf" class="file-hidden" />
        <label class="label-btn" for="pinPdfFile">Selecionar PDF PIN</label>

        <button class="btn-orange btn-disabled" id="btnAnalyze" disabled>Analisar PDF</button>
        <button class="btn-ghost btn-disabled" id="btnExcel" disabled>Gerar Excel</button>
        <button class="btn-ghost" id="btnLegend">Ver legenda</button>
        <button class="btn-ghost" id="btnClear">Limpar</button>
      </div>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="spinner"></div>
      <div style="min-width:0;">
        <div style="font-weight:900; color:var(--navy);" id="loadingTitle">Carregando...</div>
        <div style="color:#6b7280;font-size:13px;margin-top:2px;" id="loadingSub">Analisando PDF</div>
      </div>
    </div>
  </div>

  <div class="legend-overlay" id="legendOverlay">
    <div class="legend-modal">
      <div class="legend-header">
        <h2>Legenda do Relatório</h2>
        <span id="closeLegend">✕</span>
      </div>

      <div class="legend-content">
        <div class="legend-row">
          <span class="dot green"></span>
          Hora extra dentro do limite
        </div>

        <div class="legend-row">
          <span class="dot red"></span>
          Hora extra excedida
        </div>

        <div class="legend-row">
          <span class="dot blue"></span>
          Hora extra em sábado
        </div>

        <div class="legend-row">
          <span class="dot yellow"></span>
          Faltas
        </div>

        <div class="legend-row">
          <span class="dot brown"></span>
          Inconsistências
        </div>

        <div class="legend-row">
          <span class="dot orange"></span>
          Hora extra em feriado
        </div>
      </div>

      <div class="legend-footer">
        <button id="btnCloseLegend" class="btn-orange">Fechar</button>
      </div>
    </div>
  </div>

<script>
  const EXTRA_LIMIT_MIN = 72;
  const EXTRA_LIMIT_LABEL = "01:12";
  const SUSPICIOUS_EXTRA_MIN = 240;
  const CONSECUTIVE_ABSENCE_LIMIT = 11;

  const $ = (id) => document.getElementById(id);

  function getActiveStatusFilter(){
    return $("statusFilter")?.value || "all";
  }

  function hhmmToMinutes(hhmm){
    const [h,m] = (hhmm || "").split(":").map(n => parseInt(n,10));
    if(Number.isNaN(h) || Number.isNaN(m)) return 0;
    return h*60 + m;
  }

  function minutesToHHMM(min){
    const h = Math.floor(min/60);
    const m = min%60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }

  function setMsg(text){
    $("msg").textContent = text || "";
  }

  function setLoading(on, title="Carregando...", sub="Analisando PDF"){
    $("overlay").classList.toggle("on", !!on);
    $("loadingTitle").textContent = title;
    $("loadingSub").textContent = sub;
  }

  function escapeHtml(s){
    return (s || "").replace(/[&<>"']/g, (c)=>({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[c]));
  }

  function normSpaces(s){
    return (s || "").replace(/\s+/g," ").trim();
  }

  function normalizeNameKey(s){
    return normSpaces(s || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^A-Z0-9 ]/gi, "")
      .toUpperCase();
  }

  function cleanFieldValue(v){
    return normSpaces(v || "")
      .replace(/\s+(CPF|Código|Centro de Custo|Empresa|Admissão|CTPS|Série|Função|Cargo|Setor)\s*:.*$/i, "")
      .replace(/\s+CNPJ\s*:.*$/i, "")
      .replace(/\s+Local\s*:.*$/i, "")
      .replace(/\s+Endere[cç]o\s*:.*$/i, "")
      .trim();
  }

  function uniqueBy(arr, keyFn){
    const seen = new Set();
    return arr.filter(item => {
      const k = keyFn(item);
      if(seen.has(k)) return false;
      seen.add(k);
      return true;
    });
  }

  function getExtraPercentByContext(dayType, note){
    const type = (dayType || "").toUpperCase();
    const obs = (note || "").toUpperCase();

    if(type === "DOMINGO") return "100%";
    if(type === "SABADO") return "70%";
    if(obs.includes("FERIADO")) return "100%";
    return "50%";
  }

  function mergeEmployeeLists(lists){
    const employeeMap = new Map();

    lists.flat().forEach(current => {
      const key = current.code || `${current.name}|${current.costCenter}|${current.company}`;

      if(employeeMap.has(key)){
        const old = employeeMap.get(key);
        employeeMap.set(key, {
          ...old,
          name: old.name || current.name,
          code: old.code || current.code,
          costCenter: old.costCenter || current.costCenter,
          company: old.company || current.company,
          pin: old.pin || current.pin || "",
          daysWorked: Math.max(old.daysWorked || 0, current.daysWorked || 0),
          totalAbsences: Math.max(old.totalAbsences || 0, current.totalAbsences || 0),
          unjustifiedAbsences: Math.max(old.unjustifiedAbsences || 0, current.unjustifiedAbsences || 0),
          extrasOk: uniqueBy([...(old.extrasOk || []), ...(current.extrasOk || [])], x => `${x.date}|${x.time}`),
          extrasBad: uniqueBy([...(old.extrasBad || []), ...(current.extrasBad || [])], x => `${x.date}|${x.time}`),
          saturdayExtras: uniqueBy([...(old.saturdayExtras || []), ...(current.saturdayExtras || [])], x => `${x.date}|${x.time}`),
          holidayExtras: uniqueBy([...(old.holidayExtras || []), ...(current.holidayExtras || [])], x => `${x.date}|${x.time}`),
          absences: uniqueBy([...(old.absences || []), ...(current.absences || [])], x => x.date),
          incompletePunches: uniqueBy([...(old.incompletePunches || []), ...(current.incompletePunches || [])], x => `${x.date}|${x.label}|${x.note}`)
        });
      } else {
        employeeMap.set(key, current);
      }
    });

    return [...employeeMap.values()].filter(e =>
      (e.extrasBad && e.extrasBad.length > 0) ||
      (e.saturdayExtras && e.saturdayExtras.length > 0) ||
      (e.holidayExtras && e.holidayExtras.length > 0) ||
      (e.unjustifiedAbsences || 0) >= CONSECUTIVE_ABSENCE_LIMIT ||
      (e.incompletePunches && e.incompletePunches.length > 0)
    );
  }

  function findLastPlannedIndex(clean){
    const rg = /\b(08:00|09:00)\b/g;
    let last = -1;
    let m;
    while((m = rg.exec(clean)) !== null){
      last = m.index;
    }
    return last;
  }

  function extractSignalsFromLine(clean){
    const signals = [];

    if(/AFASTAMENTO\s+INSS/i.test(clean)) signals.push("INSS");
    if(/ATESTADO/i.test(clean)) signals.push("ATESTADO");
    if(/EM\s+VIAGEM/i.test(clean)) signals.push("EM VIAGEM");
    if(/FERIADO/i.test(clean)) signals.push("FERIADO");
    if(/\bFOLGA\b/i.test(clean)) signals.push("FOLGA");
    if(/F[ÉE]RIAS/i.test(clean)) signals.push("FÉRIAS");

    return signals;
  }

  function extractDayType(clean){
    if(/\bs[áa]bado\b/i.test(clean)) return "SABADO";
    if(/\bdomingo\b/i.test(clean)) return "DOMINGO";
    return "NORMAL";
  }

  function extractWeekdayFromLine(clean){
    const m = clean.match(/\b(domingo|segunda-feira|terça-feira|terca-feira|quarta-feira|quinta-feira|sexta-feira|sabado|sábado)\b/i);
    return m ? m[1] : "";
  }

  function normalizeWeekdayName(day){
    return (day || "")
      .replace(/terca-feira/i, "terça-feira")
      .replace(/sabado/i, "sábado");
  }

  function ddmmToDate(ddmm, period){
    if(!ddmm || !period) return null;
    const [d, m] = ddmm.split("/").map(n => parseInt(n, 10));
    const year = period.startYear || new Date().getFullYear();
    return new Date(year, m - 1, d);
  }

  function sameDay(a, b){
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth() === b.getMonth() &&
           a.getDate() === b.getDate();
  }

  function isWeekend(dateObj){
    const day = dateObj.getDay();
    return day === 0 || day === 6;
  }

  function buildHolidaySetFromSignals(items, period){
    const set = new Set();
    (items || []).forEach(item => {
      const hasHoliday = (item.signals || []).includes("FERIADO") || /FERIADO/i.test(item.note || "");
      if(hasHoliday){
        const dt = ddmmToDate(item.date, period);
        if(dt && !isNaN(dt)){
          set.add(dt.toDateString());
        }
      }
    });
    return set;
  }

  function buildBridgeSetFromIncomplete(items, period){
    const set = new Set();
    (items || []).forEach(item => {
      const isOnePunch = item.count === 1 || /1 batida/i.test(item.label || "");
      if(isOnePunch){
        const dt = ddmmToDate(item.date, period);
        if(dt && !isNaN(dt)){
          set.add(dt.toDateString());
        }
      }
    });
    return set;
  }

  function nextBusinessDaySkippingHoliday(dateObj, holidaySet){
    const d = new Date(dateObj);
    d.setDate(d.getDate() + 1);

    while(isWeekend(d) || holidaySet.has(d.toDateString())){
      d.setDate(d.getDate() + 1);
    }

    return d;
  }

  function getMaxConsecutiveDates(absences, period, signalMarkedDates, incompletePunches){
    if(!absences || !absences.length) return 0;

    const holidaySet = buildHolidaySetFromSignals(signalMarkedDates || [], period);
    const bridgeSet = buildBridgeSetFromIncomplete(incompletePunches || [], period);

    const eventMap = new Map();

    (absences || []).forEach(item => {
      const dt = ddmmToDate(item.date, period);
      if(dt && !isNaN(dt)){
        eventMap.set(dt.toDateString(), { dateObj: dt, kind: "absence" });
      }
    });

    (incompletePunches || []).forEach(item => {
      const isOnePunch = item.count === 1 || /1 batida/i.test(item.label || "");
      if(!isOnePunch) return;

      const dt = ddmmToDate(item.date, period);
      if(dt && !isNaN(dt) && !eventMap.has(dt.toDateString())){
        eventMap.set(dt.toDateString(), { dateObj: dt, kind: "bridge" });
      }
    });

    const events = [...eventMap.values()].sort((a,b) => a.dateObj - b.dateObj);
    if(!events.length) return 0;

    let maxStreak = 0;
    let currentStreak = 0;
    let previousDate = null;

    for(const event of events){
      if(event.kind === "absence"){
        if(previousDate === null){
          currentStreak = 1;
        } else {
          const expected = nextBusinessDaySkippingHoliday(previousDate, holidaySet);
          if(sameDay(event.dateObj, expected)){
            currentStreak += 1;
          } else {
            currentStreak = 1;
          }
        }

        previousDate = event.dateObj;

        if(currentStreak > maxStreak){
          maxStreak = currentStreak;
        }
      } else if(event.kind === "bridge"){
        if(previousDate === null) continue;

        const expected = nextBusinessDaySkippingHoliday(previousDate, holidaySet);
        if(sameDay(event.dateObj, expected) && bridgeSet.has(event.dateObj.toDateString())){
          currentStreak += 1;
          previousDate = event.dateObj;
        }
      }
    }

    return maxStreak;
  }

  function extractExtraFromLine(line, punchInfo){
    const clean = normSpaces(line || "");
    const date = clean.match(/^(\d{2}\/\d{2})\b/)?.[1];
    if(!date) return null;
    if(/FALTA\s+NAO\s+JUSTIFICADA/i.test(clean)) return null;

    const dayType = extractDayType(clean);
    const weekday = normalizeWeekdayName(extractWeekdayFromLine(clean));
    const percentLabel = getExtraPercentByContext(dayType, clean);

    if(dayType === "SABADO"){
      if(!punchInfo) return null;

      const actualPunchCount = punchInfo.actualPunchCount || punchInfo.punches.length;
      if(actualPunchCount !== 2) return null;
      if(punchInfo.hasManualAdjustment) return null;

      const saturdayExtraTime = punchInfo.saturdayExtraTime || "";
      if(!saturdayExtraTime) return null;

      return {
        date,
        time: saturdayExtraTime,
        dayType,
        weekday,
        percentLabel
      };
    }

    if(dayType === "DOMINGO"){
      const allTimes = clean.match(/\d{1,2}:\d{2}/g) || [];
      if(allTimes.length >= 3){
        return {
          date,
          time: allTimes[allTimes.length - 1],
          dayType,
          weekday,
          percentLabel
        };
      }

      if(punchInfo && punchInfo.worked){
        return {
          date,
          time: punchInfo.worked,
          dayType,
          weekday,
          percentLabel
        };
      }
    }

    if(punchInfo && punchInfo.punches.length <= 2){
      return null;
    }

    const idxPrev = findLastPlannedIndex(clean);
    if(idxPrev < 0) return null;

    const afterPrev = clean.slice(idxPrev);
    const suffixTimes = afterPrev.match(/-?\d{1,2}:\d{2}/g) || [];
    const positives = suffixTimes.filter(t => !t.startsWith("-") && t !== "08:00" && t !== "09:00");

    if(!positives.length) return null;

    return {
      date,
      time: positives[0],
      dayType,
      weekday,
      percentLabel
    };
  }

  function extractPeriodMonth(block){
    const m = block.match(/(\d{2})\/(\d{2})\/(\d{4})\s+a\s+(\d{2})\/(\d{2})\/(\d{4})/i);
    if(!m) return null;

    return {
      startDay: parseInt(m[1], 10),
      startMonth: parseInt(m[2], 10),
      startYear: parseInt(m[3], 10),
      endDay: parseInt(m[4], 10),
      endMonth: parseInt(m[5], 10),
      endYear: parseInt(m[6], 10)
    };
  }

  function dateInsidePeriod(ddmm, period){
    if(!ddmm || !period) return true;

    const [d, m] = ddmm.split("/").map(n => parseInt(n, 10));

    if(m < period.startMonth || m > period.endMonth) return false;

    if(period.startMonth === period.endMonth){
      return d >= period.startDay && d <= period.endDay;
    }

    if(m === period.startMonth && d < period.startDay) return false;
    if(m === period.endMonth && d > period.endDay) return false;

    return true;
  }

  function extractPunchInfoFromLine(line){
    const clean = normSpaces(line || "");
    const date = clean.match(/^(\d{2}\/\d{2})\b/)?.[1];
    if(!date) return null;

    const signals = extractSignalsFromLine(clean);
    const dayType = extractDayType(clean);
    const weekday = normalizeWeekdayName(extractWeekdayFromLine(clean));
    const hasManualAdjustment = /\(m\)/i.test(clean);

    if(/FALTA\s+NAO\s+JUSTIFICADA/i.test(clean)) return null;

    if(/AFASTAMENTO|FERIADO|DOMINGO|DSR|FOLGA|VIAGEM|ATESTADO|F[ÉE]RIAS/i.test(clean) && !/\d{1,2}:\d{2}/.test(clean)){
      return {
        date,
        punches: [],
        worked: "",
        signals,
        dayType,
        weekday,
        actualPunchCount: 0,
        saturdayExtraTime: "",
        hasManualAdjustment
      };
    }

    const idxPrev = findLastPlannedIndex(clean);
    const allTimes = clean.match(/\d{1,2}:\d{2}/g) || [];

    if(!allTimes.length){
      return {
        date,
        punches: [],
        worked: "",
        signals,
        dayType,
        weekday,
        actualPunchCount: 0,
        saturdayExtraTime: "",
        hasManualAdjustment
      };
    }

    if(dayType === "SABADO"){
      const punches = allTimes.slice(0, Math.min(2, allTimes.length));
      let saturdayExtraTime = "";

      if(!hasManualAdjustment && punches.length === 2){
        if(allTimes.length === 3){
          saturdayExtraTime = allTimes[2];
        } else if(allTimes.length >= 4){
          saturdayExtraTime = allTimes[allTimes.length - 1];
        }
      }

      return {
        date,
        punches,
        worked: "",
        signals,
        dayType,
        weekday,
        actualPunchCount: punches.length,
        saturdayExtraTime,
        hasManualAdjustment
      };
    }

    const beforePrev = idxPrev >= 0 ? clean.slice(0, idxPrev) : clean;
    const timesBefore = beforePrev.match(/\d{1,2}:\d{2}/g) || [];

    if(!timesBefore.length){
      return {
        date,
        punches: [],
        worked: "",
        signals,
        dayType,
        weekday,
        actualPunchCount: 0,
        saturdayExtraTime: "",
        hasManualAdjustment
      };
    }

    let punches = [];
    let worked = "";

    if(timesBefore.length <= 2){
      punches = timesBefore.slice();
    } else {
      punches = timesBefore.slice(0, -1);
      worked = timesBefore[timesBefore.length - 1];
    }

    return {
      date,
      punches,
      worked,
      signals,
      dayType,
      weekday,
      actualPunchCount: punches.length,
      saturdayExtraTime: "",
      hasManualAdjustment
    };
  }

  function initPdfJsOrShowError(){
    if(!window.pdfjsLib){
      setMsg("Erro: PDF.js não carregou. Verifique os arquivos locais e recarregue a página (Ctrl+F5).");
      $("btnAnalyze").disabled = true;
      $("btnAnalyze").classList.add("btn-disabled");
      return false;
    }

    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "./vendor/pdfjs/pdf.worker.js";
    return true;
  }

  window.addEventListener("load", () => {
    initPdfJsOrShowError();
  });

  async function extractTextFromPdf(arrayBuffer, fileIndex = 1, totalFiles = 1){
    const doc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const total = doc.numPages;
    const pages = [];

    for(let p = 1; p <= total; p++){
      setLoading(true, "Carregando...", `PDF ${fileIndex}/${totalFiles} • Página ${p} de ${total}`);

      const page = await doc.getPage(p);
      const content = await page.getTextContent({ includeMarkedContent: true });

      const rows = {};
      for(const it of content.items){
        const str = (it && it.str) ? it.str.trim() : "";
        if(!str) continue;

        const x = Math.round(it.transform[4]);
        const y = Math.round(it.transform[5]);

        if(!rows[y]) rows[y] = [];
        rows[y].push({ x, str });
      }

      const lines = Object.keys(rows)
        .map(Number)
        .sort((a,b) => b - a)
        .map(y => rows[y]
          .sort((a,b) => a.x - b.x)
          .map(t => t.str)
          .join(" ")
          .replace(/\s+/g, " ")
          .trim()
        )
        .filter(Boolean);

      pages.push(lines.join("\n"));
    }

    return pages.join("\n===PAGE_BREAK===\n");
  }


  function extractEmployeeIdentityFromBlock(block){
    const lines = block.split("\n").map(l => normSpaces(l)).filter(Boolean);
    const employerSection =
      block.match(/DADOS DO EMPREGADOR([\s\S]*?)DADOS DO COLABORADOR/i)?.[1] || "";

    const employeeSection =
      block.match(/DADOS DO COLABORADOR([\s\S]*)/i)?.[1] || block;

    const mEmployerName = employerSection.match(/Nome\s*:\s*([^\n]+)/i);
    const mName1 = employeeSection.match(/Nome\s*:\s*(.*?)\s+CPF\s*:/i);
    const mName2 = employeeSection.match(/Nome\s*:\s*([^\n]+)/i);
    const mCode = employeeSection.match(/(Código|Matr[ií]cula|Matricula)\s*[:\-]?\s*(\d{2,10})/i);
    const mCC1 = employeeSection.match(/Centro de Custo\s*:\s*([^\n]+)/i);
    const mCC2 = employeeSection.match(/Setor\s*:\s*([^\n]+)/i);
    const mEmp1 = block.match(/Empresa\s*:\s*([^\n]+)/i);
    const mEmp2 = block.match(/Raz[aã]o Social\s*:\s*([^\n]+)/i);

    let name = cleanFieldValue((mName1?.[1] || mName2?.[1] || ""));
    const code = (mCode?.[2] || "").trim();
    const costCenter = cleanFieldValue((mCC1?.[1] || mCC2?.[1] || ""));
    const company = cleanFieldValue(
      mEmployerName?.[1] ||
      mEmp1?.[1] ||
      mEmp2?.[1] ||
      ""
    );

    if(!name && code){
      const idxCodeLine = lines.findIndex(l =>
        new RegExp(`(Código|Matr[ií]cula|Matricula)\\s*[:\\-]?\\s*${code}`).test(l)
      );
      if(idxCodeLine > 0){
        const candidate = lines[idxCodeLine - 1];
        if(candidate && !/DADOS DO COLABORADOR/i.test(candidate)){
          name = cleanFieldValue(candidate);
        }
      }
    }

    return { name, code, costCenter, company };
  }

  function parseEmployeeHeaders(text){
    const pages = text.split("\n===PAGE_BREAK===\n").map(p => p.trim()).filter(Boolean);
    const headers = [];
    const seen = new Set();

    for(const block of pages){
      const identity = extractEmployeeIdentityFromBlock(block);
      if(!identity.code) continue;
      const key = identity.code || normalizeNameKey(identity.name);
      if(seen.has(key)) continue;
      seen.add(key);
      headers.push(identity);
    }

    return headers;
  }

  function parsePinList(text){
    const clean = normSpaces(text || "");
    const afterPinHeader = clean.split(/\bPIN\b/i).slice(1).join(" ");
    const base = afterPinHeader || clean;
    return (base.match(/\b\d{4}\b/g) || []);
  }

  function applyPinsToEmployees(filteredEmployees, orderedHeaders, pinList){
    if(!pinList.length || !orderedHeaders.length) return filteredEmployees;

    const pinByCode = new Map();
    const pinByName = new Map();

    orderedHeaders.forEach((header, index) => {
      const pin = (pinList[index] || "").trim();
      if(!pin) return;

      if(header.code) pinByCode.set(String(header.code).trim(), pin);
      if(header.name) pinByName.set(normalizeNameKey(header.name), pin);
    });

    return (filteredEmployees || []).map(emp => ({
      ...emp,
      pin:
        pinByCode.get(String(emp.code || "").trim()) ||
        pinByName.get(normalizeNameKey(emp.name || "")) ||
        emp.pin ||
        ""
    }));
  }


  function mergeOrderedHeaders(lists){
    const headers = [];
    const seen = new Set();

    (lists || []).flat().forEach(item => {
      const key = item.code || normalizeNameKey(item.name);
      if(!key || seen.has(key)) return;
      seen.add(key);
      headers.push(item);
    });

    return headers;
  }

  function parseEmployees(text){
    const pages = text.split("\n===PAGE_BREAK===\n").map(p => p.trim()).filter(Boolean);
    const employeeMap = new Map();

    for(const block of pages){
      const lines = block.split("\n").map(l => normSpaces(l)).filter(Boolean);
      const period = extractPeriodMonth(block);

      const identity = extractEmployeeIdentityFromBlock(block);
      const name = identity.name || "";
      const code = identity.code || "";
      const costCenter = identity.costCenter || "";
      const company = identity.company || "";

      if(!code) continue;

      const absences = [];
      const workedDates = new Set();
      const extrasOk = [];
      const extrasBad = [];
      const saturdayExtras = [];
      const holidayExtras = [];
      const incompletePunches = [];
      const signalDays = [];

      for(const line of lines){
        const dateMatch = line.match(/^(\d{2}\/\d{2})\b/);
        const date = dateMatch?.[1];
        if(date && !dateInsidePeriod(date, period)) continue;

        const lineSignals = extractSignalsFromLine(line);
        if(date && lineSignals.length){
          signalDays.push({
            date,
            signals: lineSignals
          });
        }

        if(/FALTA\s+NAO\s+JUSTIFICADA/i.test(line) && date){
          absences.push({
            date,
            weekday: normalizeWeekdayName(extractWeekdayFromLine(line))
          });
        }

        const punchInfo = extractPunchInfoFromLine(line);
        if(punchInfo && dateInsidePeriod(punchInfo.date, period)){
          const punchCount = punchInfo.punches.length;
          const notes = punchInfo.signals || [];
          const isSaturday = punchInfo.dayType === "SABADO";

          if(punchCount > 0){
            workedDates.add(punchInfo.date);
          }

          const extra = extractExtraFromLine(line, punchInfo);

          const actualPunchCount = punchInfo.actualPunchCount || punchInfo.punches.length;
          const saturdayManual = isSaturday && !!punchInfo.hasManualAdjustment;
          const saturdayWithTwoPunches = isSaturday && actualPunchCount === 2 && !saturdayManual;
          const saturdayWithExtra = saturdayWithTwoPunches && !!extra?.time;

          if(notes.length > 0){
            if(punchCount === 1 || punchCount === 2){
              if(!saturdayWithExtra && !saturdayManual){
                incompletePunches.push({
                  date: punchInfo.date,
                  weekday: punchInfo.weekday || "",
                  count: punchCount,
                  label: punchCount === 1 ? "1 batida" : "2 batidas",
                  note: notes.join(" • ")
                });
              }
            } else if(punchCount === 0){
              incompletePunches.push({
                date: punchInfo.date,
                weekday: punchInfo.weekday || "",
                count: 0,
                label: "Ocorrência",
                note: notes.join(" • ")
              });
            }
          } else if(punchCount === 1 || punchCount === 2){
            if(!saturdayWithExtra && !saturdayManual){
              incompletePunches.push({
                date: punchInfo.date,
                weekday: punchInfo.weekday || "",
                count: punchCount,
                label: punchCount === 1 ? "1 batida" : "2 batidas",
                note: ""
              });
            }
          }

          if(saturdayWithExtra){
            const saturdayTime = extra?.time || "";
            if(saturdayTime){
              const totalMin = hhmmToMinutes(saturdayTime);
              const adjustedMin = Math.max(0, totalMin - 60);

              saturdayExtras.push({
                date: punchInfo.date,
                weekday: punchInfo.weekday || "",
                time: saturdayTime,
                adjustedTime: minutesToHHMM(adjustedMin),
                note: "AJUSTE FINAL",
                percentLabel: "70%"
              });
            }
          }

          if(extra && dateInsidePeriod(extra.date, period) && !saturdayWithTwoPunches){
            const mins = hhmmToMinutes(extra.time);

            if(mins > SUSPICIOUS_EXTRA_MIN){
              incompletePunches.push({
                date: extra.date,
                weekday: extra.weekday || punchInfo.weekday || "",
                count: punchCount,
                label: "Batida incorreta",
                note: notes.join(" • ")
              });
            } else if((notes || []).includes("FERIADO") || extra.dayType === "DOMINGO"){
              holidayExtras.push({
                date: extra.date,
                weekday: extra.weekday || punchInfo.weekday || "",
                time: extra.time,
                note: extra.dayType === "DOMINGO" ? "DOMINGO" : "FERIADO",
                percentLabel: "100%"
              });
            } else if(mins > EXTRA_LIMIT_MIN){
              extrasBad.push({
                date: extra.date,
                weekday: extra.weekday || punchInfo.weekday || "",
                time: extra.time,
                dayType: extra.dayType || "NORMAL",
                percentLabel: extra.percentLabel || "50%"
              });
            } else if(mins > 0){
              extrasOk.push({
                date: extra.date,
                weekday: extra.weekday || punchInfo.weekday || "",
                time: extra.time,
                dayType: extra.dayType || "NORMAL",
                percentLabel: extra.percentLabel || "50%"
              });
            }
          }
        }
      }

      const absUnique = uniqueBy(absences, x => x.date);
      const okUnique = uniqueBy(extrasOk, x => `${x.date}|${x.time}|${x.percentLabel || ""}`);
      const badUnique = uniqueBy(extrasBad, x => `${x.date}|${x.time}|${x.percentLabel || ""}`);
      const satUnique = uniqueBy(saturdayExtras, x => `${x.date}|${x.time}|${x.percentLabel || ""}`);
      const holidayUnique = uniqueBy(holidayExtras, x => `${x.date}|${x.time}|${x.percentLabel || ""}`);
      const incompleteUnique = uniqueBy(incompletePunches, x => `${x.date}|${x.label}|${x.note}`);
      const signalUnique = uniqueBy(signalDays, x => `${x.date}|${(x.signals||[]).join("|")}`);

      const parsedDaysWorked =
        parseInt((block.match(/Dias\s+Trabalhados\s*[:\-]?\s*(\d{1,3})/i)?.[1] || "0"), 10);

      const parsedTotalAbs =
        parseInt((block.match(/Total\s+de\s+Faltas\s*[:\-]?\s*(\d{1,3})/i)?.[1] || "0"), 10);

      const consecutiveUnjustifiedAbsences = getMaxConsecutiveDates(absUnique, period, signalUnique, incompleteUnique);
      const unjustifiedAbsences = consecutiveUnjustifiedAbsences;
      const totalAbsences = Math.max(parsedTotalAbs, absUnique.length);
      const daysWorked = Math.max(parsedDaysWorked, workedDates.size);

      const current = {
        name,
        code,
        costCenter,
        company,
        pin: "",
        daysWorked,
        totalAbsences,
        unjustifiedAbsences,
        extrasOk: okUnique,
        extrasBad: badUnique,
        saturdayExtras: satUnique,
        holidayExtras: holidayUnique,
        absences: absUnique,
        incompletePunches: incompleteUnique
      };

      if(employeeMap.has(code)){
        const old = employeeMap.get(code);
        employeeMap.set(code, {
          ...old,
          name: old.name || current.name,
          costCenter: old.costCenter || current.costCenter,
          company: old.company || current.company,
          pin: old.pin || current.pin || "",
          daysWorked: Math.max(old.daysWorked, current.daysWorked),
          totalAbsences: Math.max(old.totalAbsences, current.totalAbsences),
          unjustifiedAbsences: Math.max(old.unjustifiedAbsences, current.unjustifiedAbsences),
          extrasOk: uniqueBy([...old.extrasOk, ...current.extrasOk], x => `${x.date}|${x.time}|${x.percentLabel || ""}`),
          extrasBad: uniqueBy([...old.extrasBad, ...current.extrasBad], x => `${x.date}|${x.time}|${x.percentLabel || ""}`),
          saturdayExtras: uniqueBy([...old.saturdayExtras, ...current.saturdayExtras], x => `${x.date}|${x.time}|${x.percentLabel || ""}`),
          holidayExtras: uniqueBy([...old.holidayExtras, ...current.holidayExtras], x => `${x.date}|${x.time}|${x.percentLabel || ""}`),
          absences: uniqueBy([...old.absences, ...current.absences], x => x.date),
          incompletePunches: uniqueBy([...old.incompletePunches, ...current.incompletePunches], x => `${x.date}|${x.label}|${x.note}`)
        });
      } else {
        employeeMap.set(code, current);
      }
    }

    return [...employeeMap.values()].filter(e =>
      e.extrasBad.length > 0 ||
      (e.saturdayExtras && e.saturdayExtras.length > 0) ||
      (e.holidayExtras && e.holidayExtras.length > 0) ||
      e.unjustifiedAbsences >= CONSECUTIVE_ABSENCE_LIMIT ||
      (e.incompletePunches && e.incompletePunches.length > 0)
    );
  }

  function cardHtml(e, idx){

    const saturdayCount = (e.saturdayExtras || []).length;
    const incompleteCount = (e.incompletePunches || []).length;
    const holidayCount = (e.holidayExtras || []).length;

    const onlyHEFilter = activeFilter === "he";

    const tilesBad = e.extrasBad.map(d=>{

        <div class="tile red">
          <div class="he-percent">${escapeHtml(d.percentLabel || "50%")}</div>
          <div class="date">${escapeHtml(d.date)}${d.weekday ? ` • ${escapeHtml(d.weekday)}` : ``}</div>

          <div class="time">${escapeHtml(d.time)}</div>
          <div class="warn" style="color:#1d4ed8;">${escapeHtml(d.note || "AJUSTE FINAL")}</div>

    const tilesOk = e.extrasOk.map(d=>{

        <div class="tile">
          <div class="he-percent">${escapeHtml(d.percentLabel || "50%")}</div>
          <div class="date">${escapeHtml(d.date)}${d.weekday ? ` • ${escapeHtml(d.weekday)}` : ``}</div>
          <div class="time">${escapeHtml(d.time)}</div>
        </div>
      `;
    }).join("");

    const holidayTiles = (e.holidayExtras || []).map(d=>{
      return `
        <div class="tile abs">
          <div class="he-percent">${escapeHtml(d.percentLabel || "100%")}</div>
          <div class="date">${escapeHtml(d.date)}${d.weekday ? ` • ${escapeHtml(d.weekday)}` : ``}</div>

          <div class="warn" style="color:#8a4b00;">${escapeHtml(d.note || "FERIADO")}</div>

    const inconsistentTiles = (e.incompletePunches || []).map(d=>{
      return `
        <div class="tile inc">

        </div>
      `;

    const faltasTiles = (e.absences || []).map(d=>{
      return `
        <div class="tile abs">
          <div class="date">${escapeHtml(d.date)}${d.weekday ? ` • ${escapeHtml(d.weekday)}` : ``}</div>
          <div class="time" style="font-size:14px;">Falta</div>
        </div>
      `;
    }).join("");

    const faltasAlert = (e.unjustifiedAbsences >= CONSECUTIVE_ABSENCE_LIMIT)
      ? `<div class="alert abs">⚠️ Faltas injustificadas consecutivas acima do limite (≥ ${CONSECUTIVE_ABSENCE_LIMIT}).</div>`
      : ``;

    const inconsistentAlert = incompleteCount > 0
      ? `<div class="alert inc">⚠️ ${incompleteCount} dia(s) com batida incompleta, inconsistência ou ocorrência registrada.</div>`
      : ``;

    const holidayAlert = holidayCount > 0 && !onlyHEFilter
      ? `<div class="alert abs">⚠️ ${holidayCount} dia(s) com extras em feriado.</div>`
      : ``;

    const saturdayAlert = saturdayCount > 0
      ? `<div class="alert sat">⚠️ ${saturdayCount} dia(s) com hora extra em sábado.</div>`
      : ``;

    const heAlert = (exceedCount > 0)
      ? `<div class="alert red">⚠️ ${exceedCount} dia(s) com hora extra acima do limite (${EXTRA_LIMIT_LABEL}).</div>`
      : ``;

    const hoursGridHtml = onlyHEFilter
      ? `${tilesBad}${saturdayTiles}${(tilesBad || saturdayTiles) ? "" : `<div class="meta">Sem horas extras excedidas ou HE de sábado.</div>`}`
      : `${tilesBad}${saturdayTiles}${tilesOk}${(tilesBad || tilesOk || saturdayTiles) ? "" : `<div class="meta">Sem horas extras válidas encontradas no texto do PDF.</div>`}`;

    return `
      <div class="card">
        <div class="card-head">
          <div>
            <h2 class="name">${escapeHtml(e.name || "—")}</h2>

            <span class="badge badge-abs">🟡 ${e.unjustifiedAbsences ?? 0} faltas injust. consecutivas</span>
            ${incompleteCount > 0 ? `<span class="badge badge-inc">🕒 ${incompleteCount} batidas/ocorrências</span>` : ``}
            ${holidayCount > 0 ? `<span class="badge badge-abs">🎉 ${holidayCount} extras feriado</span>` : ``}

          </div>

        <div class="stats">
          <div class="stat">
            <div class="label">Dias Trabalhados</div>
            <div class="val">${escapeHtml(String(e.daysWorked ?? "—"))}</div>
          </div>

          <div class="stat">
            <div class="label">Total de Faltas</div>
            <div class="val">${escapeHtml(String(e.totalAbsences ?? 0))}</div>
          </div>

          <div class="stat ${e.unjustifiedAbsences >= CONSECUTIVE_ABSENCE_LIMIT ? "warn":""}">
            <div class="label">Faltas Injustificadas</div>
            <div class="val">${escapeHtml(String(e.unjustifiedAbsences ?? 0))}</div>
            ${e.unjustifiedAbsences >= CONSECUTIVE_ABSENCE_LIMIT ? `<div class="mini">⚠️ Atenção: ≥ ${CONSECUTIVE_ABSENCE_LIMIT} consecutivas</div>` : ``}
          </div>

          <div class="stat">
            <div class="label">Limite HE</div>
            <div class="val">${EXTRA_LIMIT_LABEL}</div>
          </div>
        </div>

        <div class="toggle" data-open2="${idx}">
          <span class="chev open" data-chev="${idx}">⌄</span>
          <span>Ver detalhes (Horas / Faltas / Inconsistências)</span>
        </div>

        <div data-body="${idx}">
          <div class="tabs">
            <button class="tab active" data-tab="${idx}-horas" type="button">Horas</button>
            <button class="tab" data-tab="${idx}-faltas" type="button">Faltas</button>
            <button class="tab" data-tab="${idx}-incons" type="button">Inconsistências</button>
          </div>

          <div data-pane="${idx}-horas">
            <div class="grid">
              ${hoursGridHtml}
            </div>
            ${heAlert}
            ${saturdayAlert}

            ${(!onlyHEFilter && holidayTiles) ? `
              <div class="grid">${holidayTiles}</div>
            ` : ``}
            ${holidayAlert}
          </div>

          <div data-pane="${idx}-faltas" style="display:none;">
            <div class="grid">
              ${faltasTiles || `<div class="meta">Sem dias de faltas detectados no texto do PDF.</div>`}
            </div>
            ${faltasAlert}
          </div>

          <div data-pane="${idx}-incons" style="display:none;">
            <div class="grid">
              ${inconsistentTiles || `<div class="meta">Sem inconsistências detectadas no texto do PDF.</div>`}
            </div>
            ${inconsistentAlert}
          </div>
        </div>
      </div>
    `;
  }

  let allEmployees = [];
  let currentPinFile = null;

  function render(employees){
    const term = normSpaces(($("searchEmployee")?.value || "")).toLowerCase();
    const statusFilter = $("statusFilter")?.value || "all";

    const filtered = (employees || []).filter(e => {
      const text = [
        e.name || "",
        e.code || "",
        e.costCenter || "",
        e.company || ""
      ].join(" ").toLowerCase();

      const matchesSearch = !term || text.includes(term);

      const hasHE =
        (e.extrasBad && e.extrasBad.length > 0) ||
        (e.saturdayExtras && e.saturdayExtras.length > 0);

      const hasFaltas = (e.unjustifiedAbsences || 0) >= CONSECUTIVE_ABSENCE_LIMIT;

      let matchesStatus = true;
      if(statusFilter === "he") matchesStatus = hasHE;
      if(statusFilter === "faltas") matchesStatus = hasFaltas;

      return matchesSearch && matchesStatus;
    });

    if(!filtered.length){
      $("cards").innerHTML = `
        <div class="card" style="border-color: var(--border);">
          <div style="font-weight:900; color: var(--navy);">Nenhum colaborador encontrado.</div>
          <div class="meta" style="margin-top:8px;">Tente outro nome, matrícula, centro de custo ou altere o filtro.</div>
        </div>
      `;
      return;
    }

    $("cards").innerHTML = filtered.map((e, idx)=>cardHtml(e, idx)).join("");

    filtered.forEach((e, idx)=>{
      const openBtn1 = document.querySelector(`[data-open="${idx}"]`);
      const openBtn2 = document.querySelector(`[data-open2="${idx}"]`);
      const body = document.querySelector(`[data-body="${idx}"]`);
      const chevList = document.querySelectorAll(`[data-chev="${idx}"]`);

      function toggle(){
        const isHidden = body.style.display === "none";
        body.style.display = isHidden ? "" : "none";
        chevList.forEach(ch => ch.classList.toggle("open", isHidden));
      }

      openBtn1.addEventListener("click", toggle);
      openBtn2.addEventListener("click", toggle);

      const tabHoras = document.querySelector(`[data-tab="${idx}-horas"]`);
      const tabFaltas = document.querySelector(`[data-tab="${idx}-faltas"]`);
      const tabIncons = document.querySelector(`[data-tab="${idx}-incons"]`);

      const paneHoras = document.querySelector(`[data-pane="${idx}-horas"]`);
      const paneFaltas = document.querySelector(`[data-pane="${idx}-faltas"]`);
      const paneIncons = document.querySelector(`[data-pane="${idx}-incons"]`);

      tabHoras.addEventListener("click", ()=>{
        tabHoras.classList.add("active");
        tabFaltas.classList.remove("active");
        tabIncons.classList.remove("active");
        paneHoras.style.display = "";
        paneFaltas.style.display = "none";
        paneIncons.style.display = "none";
      });

      tabFaltas.addEventListener("click", ()=>{
        tabFaltas.classList.add("active");
        tabHoras.classList.remove("active");
        tabIncons.classList.remove("active");
        paneFaltas.style.display = "";
        paneHoras.style.display = "none";
        paneIncons.style.display = "none";
      });

      tabIncons.addEventListener("click", ()=>{
        tabIncons.classList.add("active");
        tabHoras.classList.remove("active");
        tabFaltas.classList.remove("active");
        paneIncons.style.display = "";
        paneHoras.style.display = "none";
        paneFaltas.style.display = "none";
      });
    });
  }

  function autoFitColumns(jsonRows){
    if(!jsonRows.length) return [];
    const keys = Object.keys(jsonRows[0]);
    return keys.map(key => {
      let max = key.length;
      jsonRows.forEach(row => {
        const val = row[key] == null ? "" : String(row[key]);
        if(val.length > max) max = val.length;
      });
      return { wch: Math.min(max + 2, 40) };
    });
  }

  function buildExcelData(employees){
    const resumo = [];
    const heExcedidas = [];
    const heSabado = [];
    const heFeriado = [];
    const faltas = [];
    const inconsistencias = [];

    (employees || []).forEach(emp => {
      resumo.push({
        "Nome": emp.name || "",
        "Matrícula": emp.code || "",
        "PIN": emp.pin || "",
        "Centro de Custo": emp.costCenter || "",
        "Empresa": emp.company || "",
        "Dias Trabalhados": emp.daysWorked ?? 0,
        "Total de Faltas": emp.totalAbsences ?? 0,
        "Faltas Injustificadas Consecutivas": emp.unjustifiedAbsences ?? 0,
        "Qtd HE Excedidas": (emp.extrasBad || []).length,
        "Qtd HE Sábado": (emp.saturdayExtras || []).length,
        "Qtd HE Feriado": (emp.holidayExtras || []).length,
        "Qtd Inconsistências": (emp.incompletePunches || []).length
      });

      (emp.extrasBad || []).forEach(item => {
        const mins = hhmmToMinutes(item.time);
        heExcedidas.push({
          "Nome": emp.name || "",
          "Matrícula": emp.code || "",
          "PIN": emp.pin || "",
          "Centro de Custo": emp.costCenter || "",
          "Empresa": emp.company || "",
          "Data": item.date || "",
          "Dia da Semana": item.weekday || "",
          "Hora Extra": item.time || "",
          "Percentual HE": item.percentLabel || "50%",
          "Limite": EXTRA_LIMIT_LABEL,
          "Excedido em": mins > EXTRA_LIMIT_MIN ? minutesToHHMM(mins - EXTRA_LIMIT_MIN) : "00:00"
        });
      });

      (emp.saturdayExtras || []).forEach(item => {
        heSabado.push({
          "Nome": emp.name || "",
          "Matrícula": emp.code || "",
          "PIN": emp.pin || "",
          "Centro de Custo": emp.costCenter || "",
          "Empresa": emp.company || "",
          "Data": item.date || "",
          "Dia da Semana": item.weekday || "",
          "Hora": item.time || "",
          "Percentual HE": item.percentLabel || "70%",
          "Observação": item.note || "SÁBADO"
        });
      });

      (emp.holidayExtras || []).forEach(item => {
        heFeriado.push({
          "Nome": emp.name || "",
          "Matrícula": emp.code || "",
          "PIN": emp.pin || "",
          "Centro de Custo": emp.costCenter || "",
          "Empresa": emp.company || "",
          "Data": item.date || "",
          "Dia da Semana": item.weekday || "",
          "Hora": item.time || "",
          "Percentual HE": item.percentLabel || "100%",
          "Observação": item.note || "FERIADO"
        });
      });

      (emp.absences || []).forEach(item => {
        faltas.push({
          "Nome": emp.name || "",
          "Matrícula": emp.code || "",
          "PIN": emp.pin || "",
          "Centro de Custo": emp.costCenter || "",
          "Empresa": emp.company || "",
          "Data": item.date || "",
          "Dia da Semana": item.weekday || "",
          "Faltas Injustificadas Consecutivas": emp.unjustifiedAbsences ?? 0
        });
      });

      (emp.incompletePunches || []).forEach(item => {
        inconsistencias.push({
          "Nome": emp.name || "",
          "Matrícula": emp.code || "",
          "PIN": emp.pin || "",
          "Centro de Custo": emp.costCenter || "",
          "Empresa": emp.company || "",
          "Data": item.date || "",
          "Dia da Semana": item.weekday || "",
          "Tipo": item.label || "",
          "Observação": item.note || ""
        });
      });
    });

    return { resumo, heExcedidas, heSabado, heFeriado, faltas, inconsistencias };
  }

  function addSheet(workbook, sheetName, rows){
    const safeRows = rows.length ? rows : [{ "Sem dados": "" }];
    const ws = XLSX.utils.json_to_sheet(safeRows);
    ws["!cols"] = autoFitColumns(safeRows);
    XLSX.utils.book_append_sheet(workbook, ws, sheetName);
  }

  function exportExcel(){
    if(!window.XLSX){
      setMsg("Erro: biblioteca do Excel não carregou.");
      return;
    }

    if(!allEmployees || !allEmployees.length){
      setMsg("Nenhum dado para exportar. Analise um PDF primeiro.");
      return;
    }

    try{
      const workbook = XLSX.utils.book_new();
      const data = buildExcelData(allEmployees);

      addSheet(workbook, "Resumo", data.resumo);
      addSheet(workbook, "HE Excedidas", data.heExcedidas);
      addSheet(workbook, "HE Sabado", data.heSabado);
      addSheet(workbook, "HE Feriado", data.heFeriado);
      addSheet(workbook, "Faltas", data.faltas);
      addSheet(workbook, "Inconsistencias", data.inconsistencias);

      const now = new Date();
      const fileName =
        `relatorio_folha_ponto_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}.xlsx`;

      XLSX.writeFile(workbook, fileName);
      setMsg("Excel gerado com sucesso.");
    }catch(err){
      console.error(err);
      setMsg("Erro ao gerar o Excel.");
    }
  }


  $("searchEmployee").addEventListener("input", ()=>{
    render(allEmployees);
  });

  $("statusFilter").addEventListener("change", ()=>{
    render(allEmployees);
  });

  $("pdfFile").addEventListener("change", (e)=>{
    const files = Array.from(e.target.files || []);
    if(!files.length) return;

    if(!initPdfJsOrShowError()){
      currentFiles = [];
      $("pdfFile").value = "";
      return;
    }

    const invalid = files.find(f => !f.name.toLowerCase().endsWith(".pdf"));
    if(invalid){
      currentFiles = [];
      setMsg("Selecione apenas arquivos PDF válidos.");
      $("btnAnalyze").disabled = true;
      $("btnAnalyze").classList.add("btn-disabled");
      $("btnExcel").disabled = true;
      $("btnExcel").classList.add("btn-disabled");
      return;
    }

    currentFiles = files;
    setMsg(`${files.length} PDF(s) da folha selecionado(s).${currentPinFile ? ` PDF PIN: ${currentPinFile.name}.` : ""}`);
    $("btnAnalyze").disabled = false;
    $("btnAnalyze").classList.remove("btn-disabled");
  });


  $("pinPdfFile").addEventListener("change", (e)=>{
    const file = (e.target.files || [])[0] || null;

    if(!file){
      currentPinFile = null;
      return;
    }

    if(!initPdfJsOrShowError()){
      currentPinFile = null;
      $("pinPdfFile").value = "";
      return;
    }

    if(!file.name.toLowerCase().endsWith(".pdf")){
      currentPinFile = null;
      $("pinPdfFile").value = "";
      setMsg("O arquivo de PIN precisa ser um PDF válido.");
      return;
    }

    currentPinFile = file;
    setMsg(`PDF(s) da folha: ${currentFiles.length || 0} • PDF PIN: ${file.name}`);
  });

  $("btnClear").addEventListener("click", ()=>{
    currentFiles = [];
    allEmployees = [];
    currentPinFile = null;
    $("pdfFile").value = "";
    $("pinPdfFile").value = "";
    $("searchEmployee").value = "";
    $("statusFilter").value = "all";
    $("cards").innerHTML = "";
    setMsg("");
    $("btnAnalyze").disabled = true;
    $("btnAnalyze").classList.add("btn-disabled");
    $("btnExcel").disabled = true;
    $("btnExcel").classList.add("btn-disabled");
  });

  $("btnAnalyze").addEventListener("click", async ()=>{
    if(!currentFiles.length) return;
    if(!initPdfJsOrShowError()) return;

    setLoading(true, "Carregando...", "Preparando leitura...");
    setMsg("Carregando...");

    try{
      const resultsPerPdf = [];
      const headersPerPdf = [];

      for(let i = 0; i < currentFiles.length; i++){
        const file = currentFiles[i];
        setLoading(true, "Carregando...", `Lendo arquivo ${i + 1} de ${currentFiles.length}: ${file.name}`);

        const buf = await file.arrayBuffer();
        const text = await extractTextFromPdf(buf, i + 1, currentFiles.length);

        setLoading(true, "Carregando...", `Interpretando dados do arquivo ${i + 1} de ${currentFiles.length}`);
        const employees = parseEmployees(text);
        const headers = parseEmployeeHeaders(text);

        resultsPerPdf.push(employees);
        headersPerPdf.push(headers);
      }

      allEmployees = mergeEmployeeLists(resultsPerPdf);

      let pinCount = 0;
      if(currentPinFile){
        setLoading(true, "Carregando...", `Lendo PDF de PIN: ${currentPinFile.name}`);
        const pinBuf = await currentPinFile.arrayBuffer();
        const pinText = await extractTextFromPdf(pinBuf, 1, 1);
        const pinList = parsePinList(pinText);
        const orderedHeaders = mergeOrderedHeaders(headersPerPdf);
        allEmployees = applyPinsToEmployees(allEmployees, orderedHeaders, pinList);
        pinCount = allEmployees.filter(emp => emp.pin).length;
      }

      render(allEmployees);

      $("btnExcel").disabled = allEmployees.length === 0;
      $("btnExcel").classList.toggle("btn-disabled", allEmployees.length === 0);

      setMsg(allEmployees.length
        ? `Análise concluída com sucesso. ${currentFiles.length} PDF(s) da folha processado(s).${currentPinFile ? ` PIN encontrado para ${pinCount} colaborador(es) exibido(s).` : ""}`
        : "Nenhum colaborador encontrado para as regras definidas.");
    }catch(err){
      console.error(err);
      setMsg("Erro ao analisar os PDFs. (Se algum PDF for escaneado como imagem, precisa OCR.)");
      $("btnExcel").disabled = true;
      $("btnExcel").classList.add("btn-disabled");
    }finally{
      setLoading(false);
    }
  });

  $("btnExcel").addEventListener("click", exportExcel);

  const legendOverlay = $("legendOverlay");

  $("btnLegend").addEventListener("click", () => {
    legendOverlay.classList.toggle("active");
  });

  $("closeLegend").addEventListener("click", () => {
    legendOverlay.classList.remove("active");
  });

  $("btnCloseLegend").addEventListener("click", () => {
    legendOverlay.classList.remove("active");
  });
</script>
</body>
</html>
